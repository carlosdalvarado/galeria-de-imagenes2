<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería Interactiva</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
    }

    .galeria {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        padding: 20px;
    }

    .imagen {
        position: relative;
        overflow: hidden;
        cursor: pointer;
    }

    .imagen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.4s ease, filter 0.4s ease;
    }

    /* EFECTO HOVER */
    .imagen:hover img {
        transform: scale(1.2);
        filter: brightness(70%);
    }

    /* TEXTO ENCIMA */
    .texto {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        padding: 10px;
        background: rgba(0,0,0,0.6);
        transform: translateY(100%);
        transition: transform 0.4s ease;
    }

    .imagen:hover .texto {
        transform: translateY(0);
    }

    /* IMAGEN GRANDE (MODAL) */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.9);
        justify-content: center;
        align-items: center;
    }

    .modal img {
        max-width: 80%;
        max-height: 80%;
    }
</style>
</head>
<body>

<h1>Galería Interactiva</h1>

<div class="galeria">
    <div class="imagen" onclick="abrirModal(this)">
        <img src="https://picsum.photos/id/1015/400/300">
        <div class="texto">Montaña</div>
    </div>
    <div class="imagen" onclick="abrirModal(this)">
        <img src="https://picsum.photos/id/1025/400/300">
        <div class="texto">Perro</div>
    </div>
    <div class="imagen" onclick="abrirModal(this)">
        <img src="https://picsum.photos/id/1035/400/300">
        <div class="texto">Bosque</div>
    </div>
    <div class="imagen" onclick="abrirModal(this)">
        <img src="https://picsum.photos/id/1045/400/300">
        <div class="texto">Playa</div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="cerrarModal()">
    <img id="imagenGrande">
</div>

<script>
function abrirModal(elemento) {
    const img = elemento.querySelector("img").src;
    const modal = document.getElementById("modal");
    const imagenGrande = document.getElementById("imagenGrande");

    imagenGrande.src = img;
    modal.style.display = "flex";
}

function cerrarModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
